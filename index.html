<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Feliz Cumpleaños 🌹</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #0b0b0f;
      --bg2:        #13131a;
      --rose:       #e8507a;
      --rose-bright:#ff6b95;
      --rose-dark:  #8c1f3e;
      --rose-glow:  rgba(232,80,122,.22);
      --gold:       #c9933a;
      --gold-lt:    #e8b84a;
      --cream:      #f5ede4;
      --cream-mid:  #d4b8a8;
      --white:      #ffffff;
      --w90:        rgba(255,255,255,.90);
      --w60:        rgba(255,255,255,.60);
      --ff-display: 'Cormorant Garamond', serif;
      --ff-body:    'Montserrat', sans-serif;
      --ff-script:  'Great Vibes', cursive;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; user-select:none; }
    html { scroll-behavior:smooth; }
    body { font-family:var(--ff-body); background:var(--bg); color:var(--cream); min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
    button { border:none; background:none; cursor:pointer; font-family:inherit; }

    #cvs { position:fixed; inset:0; pointer-events:none; z-index:9999; }
    #ptx { position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
    .pt { position:absolute; bottom:-20px; animation:rise linear infinite; opacity:0; font-style:normal; }
    @keyframes rise {
      0%   { transform:translateY(0) rotate(0deg); opacity:0; }
      6%   { opacity:.6; }
      90%  { opacity:.4; }
      100% { transform:translateY(-110vh) rotate(400deg); opacity:0; }
    }

    .scr { display:none; min-height:100vh; width:100%; position:relative; z-index:2; }
    .scr.on { display:flex; flex-direction:column; animation:scrIn .65s cubic-bezier(.4,0,.2,1) both; }
    @keyframes scrIn { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }

    /* WELCOME */
    #sw {
      align-items:center; justify-content:center; padding:4rem 1.4rem;
      background:
        radial-gradient(ellipse 55% 45% at 12% 88%, rgba(140,31,62,.40) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 88% 8%,  rgba(232,80,122,.13) 0%, transparent 60%),
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(201,147,58,.06) 0%, transparent 70%),
        #0b0b0f;
    }
    .orb { position:absolute; border-radius:50%; pointer-events:none; filter:blur(90px); animation:drift ease-in-out infinite alternate; }
    .o1 { width:500px;height:500px; background:radial-gradient(circle,rgba(232,80,122,.10),transparent 70%); top:-140px;right:-130px; animation-duration:9s; }
    .o2 { width:360px;height:360px; background:radial-gradient(circle,rgba(140,31,62,.28),transparent 70%); bottom:-90px;left:-100px; animation-duration:11s; animation-delay:-4s; }
    .o3 { width:220px;height:220px; background:radial-gradient(circle,rgba(201,147,58,.09),transparent 70%); top:38%;left:8%; animation-duration:13s; animation-delay:-7s; }
    @keyframes drift { from { transform:translate(0,0) scale(1); } to { transform:translate(28px,18px) scale(1.1); } }

    .wi { display:flex; flex-direction:column; align-items:center; width:100%; max-width:520px; position:relative; z-index:3; text-align:center; }
    .badge { width:90px; height:90px; border-radius:50%; background:linear-gradient(135deg,var(--gold-lt),var(--gold)); box-shadow:0 0 0 3px var(--bg),0 0 0 5px var(--gold),0 14px 44px rgba(201,147,58,.50); display:flex; align-items:center; justify-content:center; margin-bottom:1.4rem; animation:popIn .7s cubic-bezier(.34,1.56,.64,1) .15s both; }
    @keyframes popIn { from { transform:scale(0) rotate(-18deg); opacity:0; } to { transform:scale(1) rotate(0deg); opacity:1; } }
    .badge span { font-family:var(--ff-script); font-size:1.7rem; color:var(--bg); }
    .eyebrow { font-size:.68rem; font-weight:600; letter-spacing:.30em; text-transform:uppercase; color:var(--gold); margin-bottom:.9rem; animation:fdU .6s ease .38s both; }
    .wh1 { font-family:var(--ff-display); font-size:clamp(3rem,10vw,6rem); font-weight:300; line-height:.92; color:var(--white); letter-spacing:-.01em; margin-bottom:.5rem; animation:fdU .6s ease .50s both; }
    .wh1 em { font-style:italic; color:var(--rose-bright); display:block; }
    @keyframes fdU { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .nb { display:flex; align-items:center; gap:14px; width:100%; justify-content:center; margin:1.3rem 0; animation:fdU .6s ease .62s both; }
    .nl { flex:1; max-width:72px; height:1px; background:linear-gradient(to right,transparent,var(--rose-dark)); }
    .nl.r { background:linear-gradient(to left,transparent,var(--rose-dark)); }
    .nt { font-family:var(--ff-script); font-size:clamp(2.5rem,8vw,3.8rem); color:var(--rose-bright); text-shadow:0 0 38px var(--rose-glow); line-height:1; }
    .wsub { font-size:.86rem; font-weight:300; color:var(--w60); line-height:1.9; letter-spacing:.02em; margin-bottom:2.8rem; animation:fdU .6s ease .72s both; }
    .nav-wrap { display:flex; flex-direction:column; gap:12px; width:100%; animation:fdU .6s ease .85s both; }

    .nc { display:flex; align-items:center; gap:16px; padding:1.1rem 1.4rem; background:rgba(255,255,255,.055); border:1px solid rgba(255,255,255,.08); border-radius:16px; color:var(--white); text-align:left; transition:background .18s,border-color .18s,transform .32s cubic-bezier(.34,1.56,.64,1),box-shadow .25s; position:relative; overflow:hidden; }
    .nc::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,var(--rose-glow),transparent 60%); opacity:0; transition:opacity .18s; }
    .nc:hover { background:rgba(232,80,122,.10); border-color:rgba(232,80,122,.35); transform:translateX(7px); box-shadow:0 8px 32px rgba(0,0,0,.35),0 0 0 1px rgba(232,80,122,.18); }
    .nc:hover::before { opacity:1; }
    .nc:active { transform:translateX(3px) scale(.99); }
    .nc-icon { width:46px; height:46px; border-radius:10px; flex-shrink:0; background:linear-gradient(135deg,var(--rose-dark),var(--rose)); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 16px rgba(232,80,122,.32); }
    .nc-icon span { font-family:var(--ff-display); font-size:.95rem; font-weight:600; color:var(--cream); letter-spacing:.04em; }
    .nc-txt { flex:1; display:flex; flex-direction:column; gap:3px; }
    .nc-title { font-size:.94rem; font-weight:500; color:var(--w90); letter-spacing:.01em; }
    .nc-desc  { font-size:.73rem; font-weight:300; color:var(--w60); letter-spacing:.02em; }
    .nc-arr { font-size:1.1rem; color:var(--rose); opacity:.55; transition:opacity .18s,transform .3s cubic-bezier(.34,1.56,.64,1); }
    .nc:hover .nc-arr { opacity:1; transform:translateX(5px); }

    /* CONTENT */
    #sc {
      background:
        radial-gradient(ellipse 55% 35% at 82% 4%, rgba(232,80,122,.10) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 8% 95%, rgba(140,31,62,.22) 0%, transparent 60%),
        #0b0b0f;
    }
    .ch { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:.95rem 1.5rem; background:rgba(11,11,15,.88); backdrop-filter:blur(18px); border-bottom:1px solid rgba(255,255,255,.06); }
    .back { display:flex; align-items:center; gap:8px; padding:.48rem 1.1rem; border:1px solid rgba(232,80,122,.30); border-radius:40px; color:var(--rose); font-size:.78rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; transition:background .18s,border-color .18s,transform .3s cubic-bezier(.34,1.56,.64,1); }
    .back:hover { background:rgba(232,80,122,.10); border-color:var(--rose); transform:translateX(-5px); }
    .back .arr { transition:transform .3s cubic-bezier(.34,1.56,.64,1); }
    .back:hover .arr { transform:translateX(-3px); }
    .ch-badge { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--rose-dark),var(--rose)); display:flex; align-items:center; justify-content:center; font-family:var(--ff-script); font-size:1.2rem; color:var(--cream); box-shadow:0 4px 16px rgba(232,80,122,.30); }
    .cm { padding:2rem 1.4rem 4rem; max-width:680px; margin:0 auto; width:100%; }
    .sh { margin-bottom:2rem; padding-bottom:1.6rem; border-bottom:1px solid rgba(255,255,255,.07); }
    .sh-ey { display:block; font-size:.66rem; font-weight:600; letter-spacing:.30em; text-transform:uppercase; color:var(--gold); margin-bottom:.7rem; }
    .sh-h { font-family:var(--ff-display); font-size:clamp(2.4rem,8vw,4rem); font-weight:300; color:var(--white); line-height:.95; margin-bottom:.4rem; }
    .sh-h em { font-style:italic; color:var(--rose-bright); }
    .sh-sub { font-size:.80rem; font-weight:300; color:var(--w60); letter-spacing:.04em; }
    .div-g { display:flex; align-items:center; gap:12px; margin:1.8rem 0; color:var(--gold); font-size:.8rem; letter-spacing:.15em; }
    .div-g::before,.div-g::after { content:''; flex:1; height:1px; background:linear-gradient(to right,transparent,rgba(201,147,58,.45)); }
    .div-g::after { background:linear-gradient(to left,transparent,rgba(201,147,58,.45)); }

    .wlist { display:flex; flex-direction:column; gap:10px; }
    .wi-item { display:flex; align-items:stretch; background:var(--bg2); border:1px solid rgba(255,255,255,.06); border-radius:16px; overflow:hidden; transition:transform .3s cubic-bezier(.34,1.56,.64,1),border-color .18s,box-shadow .25s; animation:cardUp .5s ease both; }
    .wi-item:hover { transform:translateX(7px); border-color:rgba(232,80,122,.20); box-shadow:-6px 0 28px rgba(232,80,122,.08),0 8px 24px rgba(0,0,0,.28); }
    .wi-item:nth-child(1){animation-delay:.05s} .wi-item:nth-child(2){animation-delay:.13s} .wi-item:nth-child(3){animation-delay:.21s} .wi-item:nth-child(4){animation-delay:.29s} .wi-item:nth-child(5){animation-delay:.37s}
    @keyframes cardUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }
    .wi-acc { width:4px; flex-shrink:0; }
    .wi-item:nth-child(1) .wi-acc { background:linear-gradient(180deg,var(--rose),var(--rose-dark)); }
    .wi-item:nth-child(2) .wi-acc { background:linear-gradient(180deg,var(--gold-lt),var(--gold)); }
    .wi-item:nth-child(3) .wi-acc { background:linear-gradient(180deg,var(--rose),var(--rose-dark)); }
    .wi-item:nth-child(4) .wi-acc { background:linear-gradient(180deg,var(--gold-lt),var(--gold)); }
    .wi-item:nth-child(5) .wi-acc { background:linear-gradient(180deg,var(--cream-mid),var(--rose-dark)); }
    .wi-body { padding:1.35rem 1.5rem; flex:1; }
    .wi-num  { display:block; font-size:.68rem; font-weight:600; letter-spacing:.20em; color:var(--gold); text-transform:uppercase; margin-bottom:.35rem; }
    .wi-title { font-family:var(--ff-display); font-size:1.1rem; font-weight:600; color:var(--w90); margin-bottom:.3rem; }
    .wi-text  { font-size:.83rem; font-weight:300; color:var(--w60); line-height:1.82; letter-spacing:.01em; }

    .closing { margin-top:2.4rem; padding:2rem 1.8rem; text-align:center; background:linear-gradient(135deg,rgba(232,80,122,.06),rgba(201,147,58,.04)); border:1px solid rgba(232,80,122,.15); border-radius:22px; position:relative; overflow:hidden; }
    .closing::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,var(--rose),var(--gold),transparent); }
    .cl-script { font-family:var(--ff-script); font-size:clamp(2rem,7vw,3rem); color:var(--rose-bright); text-shadow:0 0 30px var(--rose-glow); display:block; margin-bottom:.7rem; }
    .cl-text { font-family:var(--ff-display); font-style:italic; font-size:.98rem; font-weight:300; color:var(--cream-mid); letter-spacing:.03em; line-height:1.8; }

    /* FLORES - OPTIMIZADO */
    #flores-screen {
      display:none; min-height:100vh; width:100%;
      position:fixed; inset:0; z-index:200;
      background:#0b0b0f;
      flex-direction:column; align-items:center; justify-content:center;
      overflow:hidden;
    }
    #flores-screen.on { display:flex; }
    #flores-canvas { position:absolute; inset:0; display:block; }
    .flores-content {
      position:relative; z-index:10;
      text-align:center; padding:2rem;
      animation:fdU 1.2s ease 1.5s both;
      background:radial-gradient(ellipse at center, rgba(0,0,0,0.5) 0%, transparent 70%);
      border-radius:60px;
    }
    .flores-title {
      font-family:var(--ff-script);
      font-size:clamp(2.5rem,10vw,5rem);
      color:var(--rose-bright);
      text-shadow:0 0 60px rgba(232,80,122,.5);
      display:block; margin-bottom:.5rem;
    }
    .flores-sub {
      font-family:var(--ff-display); font-style:italic;
      font-size:clamp(1rem,3vw,1.3rem);
      color:var(--cream-mid); letter-spacing:.08em;
    }
    .flores-back {
      position:absolute; top:1.2rem; left:1.2rem; z-index:20;
      display:flex; align-items:center; gap:8px;
      padding:.48rem 1.1rem;
      border:1px solid rgba(232,80,122,.30);
      border-radius:40px; color:var(--rose);
      font-size:.78rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase;
      cursor:pointer; background:rgba(11,11,15,0.6); backdrop-filter:blur(4px);
      transition:background .18s,border-color .18s,transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .flores-back:hover { background:rgba(232,80,122,.20); border-color:var(--rose); transform:translateX(-5px); }
    @media(max-width:480px){ .wi-body { padding:1rem; } }
  </style>
</head>
<body>

<canvas id="cvs"></canvas>
<div id="ptx"></div>

<!-- WELCOME -->
<section class="scr on" id="sw">
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="wi">
    <div class="badge"><span>✦</span></div>
    <p class="eyebrow">✦ Hoy es tu día ✦</p>
    <h1 class="wh1">Feliz<br/><em>Cumpleaños</em></h1>
    <div class="nb">
      <div class="nl"></div>
      <span class="nt">Alison</span>
      <div class="nl r"></div>
    </div>
    <p class="wsub">Hay cosas que no se dicen fácil.<br/>Hoy decidí decirlas.</p>
    <div class="nav-wrap">
      <button class="nc" onclick="open_flores()">
        <div class="nc-icon"><span>❤️</span></div>
        <div class="nc-txt">
          <span class="nc-title">Para ti</span>
          <span class="nc-desc">Algo que mereces ver hoy</span>
        </div>
        <span class="nc-arr">→</span>
      </button>
      <button class="nc" onclick="open_sec('deseos')">
        <div class="nc-icon"><span>III</span></div>
        <div class="nc-txt">
          <span class="nc-title">Lo que te deseo</span>
          <span class="nc-desc">Sin rodeos, sin adornos</span>
        </div>
        <span class="nc-arr">→</span>
      </button>
    </div>
  </div>
</section>

<!-- CONTENT -->
<section class="scr" id="sc">
  <header class="ch">
    <button class="back" onclick="go_back()"><span class="arr">←</span> Volver</button>
    <div class="ch-badge">A</div>
  </header>
  <main class="cm" id="cm"></main>
</section>

<!-- FLORES (densidad optimizada sin lag) -->
<div id="flores-screen">
  <button class="flores-back" onclick="close_flores()">← Volver</button>
  <canvas id="flores-canvas"></canvas>
  <div class="flores-content">
    <span class="flores-title">Para ti, Alison</span>
    <p class="flores-sub">porque las flores más hermosas merecen una persona igual</p>
  </div>
</div>

<script>
// CONTENIDO DE DESEOS
const SECS = {
  'deseos': {
    ey:'✦ Con todo mi cariño ✦', h:'Lo que te', em:'deseo', sub:'De alguien que te conoce de verdad',
    body:`
      <div class="wlist">
        <div class="wi-item"><div class="wi-acc"></div><div class="wi-body"><span class="wi-num">— 01</span><div class="wi-title">Que este año sea tuyo</div><p class="wi-text">Que cada día encuentres razones para sonreír, incluso en los detalles pequeños.</p></div></div>
        <div class="wi-item"><div class="wi-acc"></div><div class="wi-body"><span class="wi-num">— 02</span><div class="wi-title">Que no te conformes con poco</div><p class="wi-text">Eres de las que pueden pedir más. No de cosas materiales — de vida, de profundidad, de vínculos que valgan algo. No te achiques.</p></div></div>
        <div class="wi-item"><div class="wi-acc"></div><div class="wi-body"><span class="wi-num">— 03</span><div class="wi-title">Que te traten como mereces</div><p class="wi-text">Ojalá siempre tengas cerca a personas que te elijan con claridad, sin medias tintas. Es lo mínimo que alguien como vos debería tener.</p></div></div>
        <div class="wi-item"><div class="wi-acc"></div><div class="wi-body"><span class="wi-num">— 04</span><div class="wi-title">Que seas feliz de verdad</div><p class="wi-text">No la felicidad que se pone en una historia. La otra. La que se queda cuando apagás el teléfono y estás sola con vos misma.</p></div></div>
        <div class="wi-item"><div class="wi-acc"></div><div class="wi-body"><span class="wi-num">— 05</span><div class="wi-title">Que nos veamos pronto</div><p class="wi-text">Pero si algún día necesitás a alguien que te escuche sin juzgarte y te desee bien de verdad, sabés dónde estoy.</p></div></div>
      </div>
      <div class="div-g">✦</div>
      <div class="closing">
        <span class="cl-script">Feliz Cumpleaños, Alison</span>
        <p class="cl-text">Con todo el cariño que no siempre supe decir a tiempo.<br/>— Tú sabes quién.</p>
      </div>`
  }
};

function open_sec(key){
  const d = SECS[key]; if(!d) return;
  document.getElementById('cm').innerHTML =`
    <div class="sh">
      <span class="sh-ey">${d.ey}</span>
      <h2 class="sh-h">${d.h}<br/><em>${d.em}</em></h2>
      <p class="sh-sub">${d.sub}</p>
    </div>
    <div class="div-g">✦</div>
    ${d.body}`;
  document.getElementById('sw').classList.remove('on');
  document.getElementById('sc').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
  launch_confetti();
}

function go_back(){
  document.getElementById('sc').classList.remove('on');
  document.getElementById('sw').classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ---------- FLORES OPTIMIZADAS (DENSIDAD JUSTA Y SUAVE) ----------
let floresRaf = null;
let floresStarted = false;

function open_flores(){
  const screen = document.getElementById('flores-screen');
  screen.classList.add('on');
  document.body.style.overflow = 'hidden';
  if(!floresStarted){ 
    init_flores(); 
    floresStarted = true; 
  }
  launch_confetti();
}

function close_flores(){
  document.getElementById('flores-screen').classList.remove('on');
  document.body.style.overflow = '';
}

function init_flores(){
  const canvas = document.getElementById('flores-canvas');
  const ctx = canvas.getContext('2d');
  let flowers = [];
  let petals = [];
  let W, H;
  let frame = 0;
  let animationActive = true;

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    // Reajustar flores al cambiar tamaño (opcional, evita que se salgan)
    if(flowers.length) {
      flowers.forEach(f => {
        if(f.x > W) f.x = W - 20;
        if(f.y > H) f.y = H - 20;
      });
    }
  }
  resize();
  window.addEventListener('resize', resize);

  const ROSE_COLORS = ['#e8507a','#ff6b95','#ff85a8','#d63060','#8c1f3e','#c9933a','#f5d98a','#ff4d80','#ff99bb'];

  // Pétalo más simple (optimizado)
  function drawPetal(ctx, x, y, size, angle, color, alpha){
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(size*0.5, -size*0.6, size, 0);
    ctx.quadraticCurveTo(size*0.5, size*0.6, 0, 0);
    ctx.fillStyle = color;
    ctx.shadowBlur = 6;
    ctx.shadowColor = color;
    ctx.fill();
    ctx.restore();
  }

  function drawFlower(ctx, x, y, size, rotation, colors, alpha, frameTime){
    const petalCount = 5 + Math.floor(size / 22);
    const angleStep = (Math.PI * 2) / petalCount;
    const wobble = Math.sin(frameTime * 0.018) * 0.04;
    for(let i = 0; i < petalCount; i++){
      const angle = rotation + i * angleStep + wobble;
      drawPetal(ctx, x, y, size * 0.85, angle, colors[i % colors.length], alpha * 0.92);
    }
    const innerCount = Math.max(4, Math.floor(petalCount * 0.6));
    const innerStep = (Math.PI * 2) / innerCount;
    for(let i = 0; i < innerCount; i++){
      const angle = rotation + i * innerStep + angleStep/1.8 - wobble;
      drawPetal(ctx, x, y, size * 0.52, angle, colors[(i+1) % colors.length], alpha * 0.88);
    }
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(x, y, size * 0.2, 0, Math.PI*2);
    ctx.fillStyle = '#f5d98a';
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, size * 0.1, 0, Math.PI*2);
    ctx.fillStyle = '#c9933a';
    ctx.fill();
    ctx.restore();
  }

  // Cantidad optimizada: ~32-40 flores (suficiente para verse lleno pero fluido)
  function createFlowers(){
    flowers = [];
    let target = Math.min(42, Math.max(30, Math.floor((W * H) / 28000) + 22));
    for(let i = 0; i < target; i++){
      const size = 34 + Math.random() * 58;
      flowers.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.0025,
        colors: [
          ROSE_COLORS[Math.floor(Math.random() * ROSE_COLORS.length)],
          ROSE_COLORS[Math.floor(Math.random() * ROSE_COLORS.length)],
          ROSE_COLORS[Math.floor(Math.random() * ROSE_COLORS.length)],
        ],
        alpha: 0,
        targetAlpha: 0.55 + Math.random() * 0.35,
        vy: -0.1 - Math.random() * 0.22,
        vx: (Math.random() - 0.5) * 0.15,
        delay: Math.random() * 60,
        born: 0
      });
    }
  }
  createFlowers();

  function spawnPetal(){
    if(petals.length > 65) return;
    petals.push({
      x: Math.random() * W,
      y: H + 8,
      size: 7 + Math.random() * 16,
      angle: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.05,
      vy: -(1.0 + Math.random() * 1.8),
      vx: (Math.random() - 0.5) * 0.9,
      color: ROSE_COLORS[Math.floor(Math.random() * ROSE_COLORS.length)],
      alpha: 0.6 + Math.random() * 0.3,
      life: 1
    });
  }

  function loop(){
    if(!animationActive) return;
    floresRaf = requestAnimationFrame(loop);
    ctx.clearRect(0, 0, W, H);
    
    // Fondo elegante degradado
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0c070a');
    grad.addColorStop(1, '#130a10');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    // Halos suaves
    for(let i = 0; i < 3; i++){
      const hx = W * (0.2 + i * 0.3);
      const hy = H * 0.4 + Math.sin(frame * 0.008 + i) * 30;
      const halo = ctx.createRadialGradient(hx, hy, 0, hx, hy, 180);
      halo.addColorStop(0, 'rgba(232,80,122,0.08)');
      halo.addColorStop(1, 'transparent');
      ctx.fillStyle = halo;
      ctx.fillRect(0, 0, W, H);
    }
    
    // Spawn de pétalos cada ciertos frames (menos agresivo)
    if(frame % 9 === 0 && petals.length < 55) spawnPetal();
    
    // Actualizar y dibujar pétalos
    for(let i=0; i<petals.length; i++){
      const p = petals[i];
      p.x += p.vx + Math.sin(frame * 0.02 + i) * 0.2;
      p.y += p.vy;
      p.angle += p.rotSpeed;
      p.life -= 0.004;
      if(p.y < -40 || p.life <= 0){
        petals.splice(i,1);
        i--;
        continue;
      }
      drawPetal(ctx, p.x, p.y, p.size, p.angle, p.color, p.alpha * p.life);
    }
    
    // Dibujar flores
    for(let i=0; i<flowers.length; i++){
      const f = flowers[i];
      f.born++;
      if(f.born < f.delay) continue;
      f.alpha = Math.min(f.targetAlpha, f.alpha + 0.008);
      f.rotation += f.rotSpeed;
      f.x += f.vx + Math.sin(frame * 0.01 + f.x) * 0.05;
      f.y += f.vy;
      if(f.y < -f.size){
        f.y = H + f.size;
        f.x = Math.random() * W;
        f.alpha = 0;
        f.born = 0;
      }
      drawFlower(ctx, f.x, f.y, f.size, f.rotation, f.colors, f.alpha, frame);
    }
    frame++;
  }
  
  loop();
}

// CONFETTI OPTIMIZADO
const cvs = document.getElementById('cvs');
const ctx2d = cvs.getContext('2d');
let pieces = [], rafConf = null;
const COLS = ['#e8507a','#ff6b95','#c9933a','#e8b84a','#f5d98a','#f5ede4','#8c1f3e','rgba(255,255,255,.8)'];
function resize_cvs(){ cvs.width = innerWidth; cvs.height = innerHeight; }
resize_cvs(); addEventListener('resize',resize_cvs);

function launch_confetti(){
  if(rafConf) cancelAnimationFrame(rafConf);
  pieces = Array.from({length:130}, () => ({
    x:Math.random()*cvs.width, y:-20,
    w:3+Math.random()*7, h:6+Math.random()*10,
    col:COLS[Math.floor(Math.random()*COLS.length)],
    rot:Math.random()*Math.PI*2, rv:(Math.random()-.5)*0.12,
    vy:2.2+Math.random()*3.4, vx:(Math.random()-.5)*2,
    a:1, circ:Math.random()>.6
  }));
  function tick(){
    ctx2d.clearRect(0,0,cvs.width,cvs.height);
    let alive = false;
    for(let p of pieces){
      p.x += p.vx; p.y += p.vy; p.rot += p.rv; p.vy += 0.045;
      if(p.y > cvs.height*0.7) p.a -= 0.018;
      if(p.a <= 0) continue;
      alive = true;
      ctx2d.save();
      ctx2d.globalAlpha = Math.max(0,p.a);
      ctx2d.translate(p.x,p.y);
      ctx2d.rotate(p.rot);
      ctx2d.fillStyle = p.col;
      if(p.circ){ ctx2d.beginPath(); ctx2d.arc(0,0,p.w/2,0,Math.PI*2); ctx2d.fill(); }
      else { ctx2d.fillRect(-p.w/2,-p.h/2,p.w,p.h); }
      ctx2d.restore();
    }
    if(alive) rafConf = requestAnimationFrame(tick);
    else ctx2d.clearRect(0,0,cvs.width,cvs.height);
  }
  tick();
}
